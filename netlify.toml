[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/transcribe"
  to = "/.netlify/functions/transcribe"
  status = 200

[[redirects]]
  from = "/api/habit-sim"
  to = "/.netlify/functions/habit-sim"
  status = 200

[[redirects]]
  from = "/api/quit-habit"
  to = "/.netlify/functions/quit-habit"
  status = 200

[[redirects]]
  from = "/api/deutsch-learn"
  to = "/.netlify/functions/deutsch-learn"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
